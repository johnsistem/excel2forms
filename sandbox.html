<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Web Form - Excel2Forms</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI',Arial,sans-serif; background: #f5f5f5; padding: 24px; color: #333; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 500; color: #1a237e; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 16px; }
  .card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 16px; }
  .card-title { font-size: 14px; font-weight: 600; color: #1a237e; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #e0e0e0; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: #555; font-weight: 500; }
  .field input, .field select {
    padding: 8px 12px; border: 1px solid #c0c0c0; border-radius: 4px;
    font-size: 14px; font-family: inherit; background: #fff; color: #333;
  }
  .field input:focus, .field select:focus { outline: 2px solid #1976d2; border-color: transparent; }
  .btn {
    padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer;
    font-size: 13px; font-weight: 500; font-family: inherit;
  }
  .btn-primary { background: #1976d2; color: #fff; }
  .btn-primary:hover { background: #1565c0; }
  .btn-primary:disabled { background: #b0bec5; color: #fff; cursor: not-allowed; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f5f5f5; padding: 10px 8px; border: 1px solid #e0e0e0; font-weight: 600; font-size: 12px; text-align: left; }
  td { border: 1px solid #e0e0e0; padding: 8px; }
  .log-bar { background: #1e293b; border-radius: 6px; padding: 8px 12px; color: #94a3b8; font-family: 'Consolas', monospace; font-size: 11px; margin-top: 12px; max-height: 80px; overflow-y: auto; display: none; }
  #log { display: flex; flex-wrap: wrap; gap: 4px 12px; }
  #log .ok { color: #4ade80; }
  #log .info { color: #60a5fa; }
</style>
</head>
<body>

<div class="container">
  <h1>Excel2Forms</h1>
  <p class="subtitle">Automate web forms from Excel files.</p>

    <div class="card" style="border:2px solid #f59e0b">
        <div class="card-title" style="color:#f59e0b">Form</div>
        <form id="genericTestForm">
          <div class="grid">
            <div class="field">
              <label for="nombre">Name</label>
              <input type="text" id="nombre" name="nombre" placeholder="Full name">
            </div>
            <div class="field">
              <label for="cedula">ID Number</label>
              <input type="text" id="cedula" name="cedula" placeholder="ID number">
            </div>
            <div class="field">
              <label for="correo">Email</label>
              <input type="email" id="correo" name="correo" placeholder="email@example.com">
            </div>
            <div class="field">
              <label for="telefono">Phone</label>
              <input type="tel" id="telefono" name="telefono" placeholder="+505 8888-8888">
            </div>
            <div class="field">
              <label for="cargo">Position</label>
              <select id="cargo" name="cargo">
                <option value="">Select...</option>
                <option value="docente">Teacher</option>
                <option value="director">Principal</option>
                <option value="administrativo">Administrative</option>
                <option value="tecnico">Technician</option>
              </select>
            </div>
          </div>
          <div style="margin-top:14px;text-align:center">
            <button type="submit" class="btn btn-primary" id="btnGuardarGeneric" style="background:#f59e0b;color:#000;font-weight:700" disabled>Save</button>
          </div>
        </form>

        <div style="margin-top:16px">
          <h3 style="font-size:13px;margin-bottom:8px;color:#92400e">Saved Records</h3>
          <table>
            <thead>
              <tr>
                <th style="padding:6px 8px;border-bottom:2px solid #f59e0b;background:#fefce8;color:#92400e">#</th>
                <th style="padding:6px 8px;border-bottom:2px solid #f59e0b;background:#fefce8;color:#92400e">Name</th>
                <th style="padding:6px 8px;border-bottom:2px solid #f59e0b;background:#fefce8;color:#92400e">ID Number</th>
                <th style="padding:6px 8px;border-bottom:2px solid #f59e0b;background:#fefce8;color:#92400e">Email</th>
                <th style="padding:6px 8px;border-bottom:2px solid #f59e0b;background:#fefce8;color:#92400e">Phone</th>
                <th style="padding:6px 8px;border-bottom:2px solid #f59e0b;background:#fefce8;color:#92400e">Position</th>
              </tr>
            </thead>
            <tbody id="gfGridBody"></tbody>
          </table>
          <div id="gfEmptyGridMsg" style="text-align:center;padding:24px;color:#999;font-size:13px">
            No saved records yet.
          </div>
        </div>
      </div>

    <div class="log-bar" id="logBar">
      <div id="log"></div>
    </div>
  </div>
</div>

<script>
let gfRecords = [];
let gfCounter = 0;

function log(type, msg) {
  const el = document.getElementById('log');
  const bar = document.getElementById('logBar');
  if (bar) bar.style.display = 'block';
  const d = document.createElement('div');
  d.className = type;
  d.textContent = `${msg}`;
  el.appendChild(d);
}

function renderGenericGrid() {
  const tbody = document.getElementById('gfGridBody');
  const empty = document.getElementById('gfEmptyGridMsg');
  tbody.innerHTML = '';
  if (gfRecords.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  gfRecords.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td style="padding:6px 8px;border-bottom:1px solid #e0e0e0">${r._id}</td>
      <td style="padding:6px 8px;border-bottom:1px solid #e0e0e0">${r.nombre}</td>
      <td style="padding:6px 8px;border-bottom:1px solid #e0e0e0">${r.cedula}</td>
      <td style="padding:6px 8px;border-bottom:1px solid #e0e0e0">${r.correo}</td>
      <td style="padding:6px 8px;border-bottom:1px solid #e0e0e0">${r.telefono}</td>
      <td style="padding:6px 8px;border-bottom:1px solid #e0e0e0">${r.cargo}</td>`;
    tbody.appendChild(tr);
  });
}

function gfHandleSubmit() {
  const data = {};
  ['nombre','cedula','correo','telefono','cargo'].forEach(id => { data[id] = document.getElementById(id).value; });
  if (!data.nombre && !data.cedula) { log('⚠ Empty fields — not saved'); return false; }
  gfCounter++;
  gfRecords.push({ ...data, _id: gfCounter });
  renderGenericGrid();
  log(`✓ #${gfCounter} Saved: ${data.nombre}`);
  ['nombre','cedula','correo','telefono','cargo'].forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('btnGuardarGeneric').disabled = true;
  return true;
}
window.__gfSaveCurrent = gfHandleSubmit;

document.getElementById('genericTestForm').addEventListener('submit', function(e) {
  e.preventDefault();
  gfHandleSubmit();
});

document.querySelectorAll('#genericTestForm input, #genericTestForm select').forEach(el => {
  el.addEventListener('input', toggleGenericGuardar);
  el.addEventListener('change', toggleGenericGuardar);
});
function toggleGenericGuardar() {
  const hasData = ['nombre','cedula'].some(id => document.getElementById(id).value.trim());
  document.getElementById('btnGuardarGeneric').disabled = !hasData;
}

// Initial state ready
</script>
</body>
</html>
